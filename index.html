/* ═══════════════════════════════════════════
   DESIGN KIT DRAWING HELPERS
   ═══════════════════════════════════════════ */

function wrapText(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let current = "";
  for (const word of words) {
    const test = current ? current + " " + word : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
    } else { current = test; }
  }
  if (current) lines.push(current);
  return lines;
}

function fitText(ctx, text, maxWidth, maxLines, startSize, minSize, fontPrefix) {
  let size = startSize;
  while (size >= minSize) {
    ctx.font = `${fontPrefix} ${size}px 'Oswald', sans-serif`;
    const lines = wrapText(ctx, text, maxWidth);
    if (lines.length <= maxLines) return { fontSize: size, lines, lineHeight: size * 1.15 };
    size -= 2;
  }
  ctx.font = `${fontPrefix} ${minSize}px 'Oswald', sans-serif`;
  let truncated = text;
  while (truncated.length > 3) {
    const lines = wrapText(ctx, truncated + "\u2026", maxWidth);
    if (lines.length <= maxLines) return { fontSize: minSize, lines, lineHeight: minSize * 1.15 };
    const lastSpace = truncated.lastIndexOf(" ");
    if (lastSpace <= 0) break;
    truncated = truncated.substring(0, lastSpace);
  }
  const lines = wrapText(ctx, truncated + "\u2026", maxWidth);
  return { fontSize: minSize, lines: lines.slice(0, maxLines), lineHeight: minSize * 1.15 };
}

function fitSingleLine(ctx, text, maxWidth, startSize, minSize, fontPrefix) {
  let size = startSize;
  while (size >= minSize) {
    ctx.font = `${fontPrefix} ${size}px 'Oswald', sans-serif`;
    if (ctx.measureText(text).width <= maxWidth) return size;
    size -= 2;
  }
  ctx.font = `${fontPrefix} ${minSize}px 'Oswald', sans-serif`;
  return minSize;
}

function drawLogo(ctx, img, x, y, size) {
  if (!img) return;
  const aspect = img.width / img.height;
  let dw = size, dh = size;
  if (aspect > 1) dh = size / aspect; else dw = size * aspect;
  ctx.drawImage(img, x + (size - dw) / 2, y + (size - dh) / 2, dw, dh);
}

function luminance(hex) {
  const c = hex.replace("#","");
  const r = parseInt(c.substr(0,2),16)/255, g = parseInt(c.substr(2,2),16)/255, b = parseInt(c.substr(4,2),16)/255;
  const toL = v => v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  return 0.2126*toL(r) + 0.7152*toL(g) + 0.0722*toL(b);
}
function drawInitials(ctx, name, x, y, size, accentColor) {
  const initials = name.split(" ").map(w => w[0] || "").join("").substring(0, 2).toUpperCase() || "YN";
  ctx.fillStyle = accentColor;
  ctx.beginPath(); ctx.roundRect(x, y, size, size, 6); ctx.fill();
  ctx.fillStyle = luminance(accentColor) > 0.35 ? "#1a1a1a" : "#FFFFFF";
  ctx.font = `bold ${size * 0.4}px 'Oswald', sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(initials, x + size / 2, y + size / 2);
  ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
}

function drawLogoOrInitials(ctx, logo, name, x, y, size, accentColor, opacity) {
  ctx.save(); ctx.globalAlpha = (opacity != null ? opacity : 100) / 100;
  if (logo) drawLogo(ctx, logo, x, y, size);
  else drawInitials(ctx, name, x, y, size, accentColor);
  ctx.restore();
}

function drawBgCover(ctx, img, W, H, overlayOpacity) {
  const imgA = img.width / img.height, canA = W / H;
  let sx, sy, sw, sh;
  if (imgA > canA) { sh = img.height; sw = img.height * canA; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = img.width / canA; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
  if (overlayOpacity > 0) { ctx.fillStyle = `rgba(0,0,0,${overlayOpacity / 100})`; ctx.fillRect(0, 0, W, H); }
}

      ctx.save(); ctx.translate(off.headline.dx, off.headline.dy);
      const fit = fitText(ctx, headText, 900, 3, 76, 34, "bold");
      ctx.fillStyle = "#FFFFFF";
      const bH = fit.lines.length * fit.lineHeight;
      const zT = showPrehead ? 190 : 80, zB = H - 70;
      const fY = zT + (zB - zT - bH) / 2 + fit.lineHeight / 2;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      fit.lines.forEach((l, i) => ctx.fillText(l, W / 2, fY + i * fit.lineHeight));
      ctx.textBaseline = "alphabetic"; ctx.textAlign = "start";
      hb.headline = { x: (W - 900) / 2 + off.headline.dx, y: fY - fit.lineHeight / 2 + off.headline.dy, w: 900, h: bH };
      ctx.restore();
    }
    if (showUrl) {
      ctx.save(); ctx.translate(off.url.dx, off.url.dy);
      ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "400 17px 'Oswald', sans-serif"; ctx.textAlign = "center"; ctx.fillText(url || "yourstack.substack.com", W / 2, H - 36); ctx.textAlign = "start";
      const uW = ctx.measureText(url || "yourstack.substack.com").width;
      hb.url = { x: (W - uW) / 2 + off.url.dx, y: H - 52 + off.url.dy, w: uW, h: 24 };
      ctx.restore();
    }
    if (showLogo) {
      ctx.save(); ctx.translate(off.logo.dx, off.logo.dy);
      drawLogoOrInitials(ctx, logo, name, W - 130, H - 110, 70, darkColor, logoOpacity);
      hb.logo = { x: W - 130 + off.logo.dx, y: H - 110 + off.logo.dy, w: 70, h: 70 };
      ctx.restore();
    }
  }
}

function drawProfileBanner(ctx, inputs, style) {
  const W = 1200, H = 400;
  const { name, tagline, url, darkColor, accentColor, logo, logoOpacity, showHeadline, showLogo, showUrl } = inputs;
  const nameText = (name || "YOUR NEWSLETTER").toUpperCase();
  const tagText = tagline || "A short tagline about what you write";
  if (style === "diagonal") {
    ctx.fillStyle = darkColor; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = accentColor; ctx.beginPath(); ctx.moveTo(W*0.6, 0); ctx.lineTo(W, 0); ctx.lineTo(W, H); ctx.lineTo(W*0.42, H); ctx.closePath(); ctx.fill();
    ctx.fillStyle = accentColor; ctx.font = "bold 16px 'Oswald', sans-serif";
    const catText = (inputs.category || "YOUR CATEGORY").toUpperCase(), cW = ctx.measureText(catText).width;
    ctx.fillRect(56, 60, cW + 32, 30); ctx.fillStyle = darkColor; ctx.textBaseline = "middle"; ctx.fillText(catText, 72, 75); ctx.textBaseline = "alphabetic";
    if (showHeadline) { fitSingleLine(ctx, nameText, 500, 58, 28, "bold"); ctx.fillStyle = "#FFFFFF"; ctx.fillText(nameText, 56, 170); }
    const tagFit = fitText(ctx, tagText, 480, 2, 19, 14, "400"); ctx.fillStyle = "rgba(255,255,255,0.6)";
    tagFit.lines.forEach((l, i) => ctx.fillText(l, 56, 210 + i * tagFit.lineHeight));
    if (showUrl) { ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "400 16px 'Oswald', sans-serif"; ctx.fillText(url || "yourstack.substack.com", 56, H - 36); }
    if (showLogo) drawLogoOrInitials(ctx, logo, name, W - 170, H - 170, 110, accentColor, logoOpacity);
  } else if (style === "bar") {
    ctx.fillStyle = darkColor; ctx.fillRect(0, 0, W, H); ctx.fillStyle = accentColor; ctx.fillRect(0, 0, W, 6);
    if (showHeadline) { fitSingleLine(ctx, nameText, 800, 54, 26, "bold"); ctx.fillStyle = "#FFFFFF"; ctx.fillText(nameText, 56, 140); }
    ctx.fillStyle = accentColor; ctx.fillRect(56, 156, 200, 4);
    const tagFit = fitText(ctx, tagText, 600, 2, 19, 14, "400"); ctx.fillStyle = "rgba(255,255,255,0.55)";
    tagFit.lines.forEach((l, i) => ctx.fillText(l, 56, 200 + i * tagFit.lineHeight));
    if (showUrl) { ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.font = "400 16px 'Oswald', sans-serif"; ctx.fillText(url || "yourstack.substack.com", 56, H - 36); }
    if (showLogo) drawLogoOrInitials(ctx, logo, name, W - 140, (H - 80) / 2, 80, accentColor, logoOpacity);
  } else {
    ctx.fillStyle = accentColor; ctx.fillRect(0, 0, W, H);
    if (showHeadline) { fitSingleLine(ctx, nameText, 900, 60, 28, "bold"); ctx.fillStyle = "#FFFFFF"; ctx.textAlign = "center"; ctx.fillText(nameText, W / 2, 160); }
    fitSingleLine(ctx, tagText, 800, 20, 14, "400"); ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.textAlign = "center"; ctx.fillText(tagText, W / 2, 210);
    if (showUrl) { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "400 16px 'Oswald', sans-serif"; ctx.fillText(url || "yourstack.substack.com", W / 2, H - 36); }
    ctx.textAlign = "start"; if (showLogo) drawLogoOrInitials(ctx, logo, name, (W - 60) / 2, 250, 60, darkColor, logoOpacity);
  }
}

function drawEmailBanner(ctx, inputs, style) {
  const W = 1100, H = 220;
  const { name, tagline, darkColor, accentColor, logo, logoOpacity, showHeadline, showLogo, showUrl } = inputs;
  const nameText = (name || "YOUR NEWSLETTER").toUpperCase();
  const tagText = tagline || "Your tagline goes here";
  if (style === "diagonal") {
    ctx.fillStyle = darkColor; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = accentColor; ctx.beginPath(); ctx.moveTo(W*0.78, 0); ctx.lineTo(W, 0); ctx.lineTo(W, H); ctx.lineTo(W*0.68, H); ctx.closePath(); ctx.fill();
    ctx.fillStyle = accentColor; ctx.fillRect(0, 0, W*0.75, 4);
    if (showHeadline) { fitSingleLine(ctx, nameText, 700, 48, 22, "bold"); ctx.fillStyle = "#FFFFFF"; ctx.textBaseline = "middle"; ctx.fillText(nameText, 40, H * 0.42); }
    fitSingleLine(ctx, tagText.toUpperCase(), 700, 16, 11, "400"); ctx.fillStyle = accentColor; ctx.textBaseline = "middle"; ctx.fillText(tagText.toUpperCase(), 40, H * 0.68); ctx.textBaseline = "alphabetic";
    if (showLogo) drawLogoOrInitials(ctx, logo, name, W - 130, (H - 80) / 2, 80, accentColor, logoOpacity);
  } else if (style === "bar") {
    ctx.fillStyle = darkColor; ctx.fillRect(0, 0, W, H); ctx.fillStyle = accentColor; ctx.fillRect(0, 0, W, 5); ctx.fillRect(0, H - 5, W, 5);
    if (showHeadline) { fitSingleLine(ctx, nameText, 800, 44, 22, "bold"); ctx.fillStyle = "#FFFFFF"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(nameText, W / 2, H * 0.4); }
    fitSingleLine(ctx, tagText, 700, 16, 11, "400"); ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(tagText, W / 2, H * 0.65);
    ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
  } else {
    ctx.fillStyle = accentColor; ctx.fillRect(0, 0, W, H);
    if (showHeadline) { fitSingleLine(ctx, nameText, 750, 48, 22, "bold"); ctx.fillStyle = "#FFFFFF"; ctx.textBaseline = "middle"; ctx.fillText(nameText, 40, H * 0.42); }
    fitSingleLine(ctx, tagText, 750, 16, 11, "400"); ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.textBaseline = "middle"; ctx.fillText(tagText, 40, H * 0.68); ctx.textBaseline = "alphabetic";
    if (showLogo) drawLogoOrInitials(ctx, logo, name, W - 120, (H - 70) / 2, 70, darkColor, logoOpacity);
  }
}

function drawWordmark(ctx, inputs, style) {
  const W = 1344, H = 256;
  const { name, accentColor, darkColor, logo, logoOpacity, showHeadline, showLogo } = inputs;
  ctx.clearRect(0, 0, W, H);
  const displayName = (name || "YOUR NEWSLETTER").toUpperCase();
  const logoSize = 140, gap = 28, logoX = 48, logoY = (H - logoSize) / 2;
  const textX = logoX + logoSize + gap, maxTextW = W - textX - 40;
  if (style === "diagonal") {
    ctx.save(); ctx.fillStyle = accentColor; ctx.globalAlpha = 0.15;
    ctx.beginPath(); ctx.moveTo(100, 0); ctx.lineTo(180, 0); ctx.lineTo(80, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill(); ctx.restore();
    if (showLogo) drawLogoOrInitials(ctx, logo, name, logoX, logoY, logoSize, accentColor, logoOpacity);
    if (showHeadline) { fitSingleLine(ctx, displayName, maxTextW, 88, 32, "bold"); ctx.fillStyle = darkColor; ctx.textBaseline = "middle"; ctx.fillText(displayName, textX, H / 2 + 2); ctx.textBaseline = "alphabetic"; }
  } else if (style === "bar") {
    if (showLogo) drawLogoOrInitials(ctx, logo, name, logoX, logoY, logoSize, accentColor, logoOpacity);
    if (showHeadline) { const size = fitSingleLine(ctx, displayName, maxTextW, 88, 32, "bold"); ctx.fillStyle = darkColor; ctx.textBaseline = "middle"; ctx.fillText(displayName, textX, H / 2 - 6);
    ctx.fillStyle = accentColor; const tW = ctx.measureText(displayName).width; ctx.fillRect(textX, H / 2 + size * 0.42, Math.min(tW, maxTextW), 6); ctx.textBaseline = "alphabetic"; }
  } else {
    if (showLogo) drawLogoOrInitials(ctx, logo, name, logoX, logoY, logoSize, accentColor, logoOpacity);
    if (showHeadline) { fitSingleLine(ctx, displayName, maxTextW, 88, 32, "bold"); ctx.fillStyle = accentColor; ctx.textBaseline = "middle"; ctx.fillText(displayName, textX, H / 2 + 2); ctx.textBaseline = "alphabetic"; }
  }
}

const DRAW_FNS = { postHeader: drawPostHeader, profileBanner: drawProfileBanner, emailBanner: drawEmailBanner, wordmark: drawWordmark };

function App() {
  const [tab, setTab] = useState("templates");

  // Shared state
  const [inputs, setInputs] = useState({ ...DEFAULT_INPUTS });
  const [kitStyle, setKitStyle] = useState("diagonal");
  const [fontLoaded, setFontLoaded] = useState(false);
  const [logoPreview, setLogoPreview] = useState(null);
  const [bgPreview, setBgPreview] = useState(null);
  const canvasRefs = useRef({});
  const [elemOffsets, setElemOffsets] = useState(JSON.parse(JSON.stringify(DEFAULT_OFFSETS)));
  const hitBoxesRef = useRef({});
  const dragRef = useRef(null);

  // Thumbnail generator state
  const [thumbStyle, setThumbStyle] = useState(null);
  const [renderMode, setRenderMode] = useState("illustration");
  const [complexity, setComplexity] = useState("clean");
  const [topic, setTopic] = useState("");
  const [aiTool, setAiTool] = useState("dalle");
  const [generatedPrompt, setGeneratedPrompt] = useState("");
  const [copied, setCopied] = useState(false);

  // Font loading
  useEffect(() => {
    const loadFonts = async () => {
      await Promise.all([
        document.fonts.load("400 48px 'Oswald'"),
        document.fonts.load("700 48px 'Oswald'"),
        document.fonts.load("400 48px 'Inter'"),
        document.fonts.load("700 48px 'Inter'"),
      ]);
      await document.fonts.ready;
      setFontLoaded(true);
    };
    loadFonts();
  }, []);

  // Canvas redraw
  const redraw = useCallback(() => {
    if (!fontLoaded) return;
    hitBoxesRef.current = {};
    for (const t of TEMPLATES) {
      const canvas = canvasRefs.current[t.id];
      if (!canvas) continue;
      canvas.width = t.width; canvas.height = t.height;
      const ctx = canvas.getContext("2d");
      if (t.id === "wordmark") ctx.clearRect(0, 0, t.width, t.height);
      else { ctx.fillStyle = inputs.darkColor; ctx.fillRect(0, 0, t.width, t.height); }
      if (t.id === "postHeader") {
        drawPostHeader(ctx, inputs, kitStyle, elemOffsets, hitBoxesRef.current);
      } else {
        DRAW_FNS[t.id](ctx, inputs, kitStyle);
      }
    }
  }, [inputs, kitStyle, fontLoaded, elemOffsets]);

  useEffect(() => { if (tab === "templates") redraw(); }, [redraw, tab]);

  // Prompt generation
  useEffect(() => {
    const s = ALL_THUMB_STYLES.find(st => st.id === thumbStyle);
    const tool = AI_TOOLS.find(t => t.id === aiTool);
    if (!s || !topic.trim() || !tool) { setGeneratedPrompt(""); return; }
    const colorStr = `${inputs.accentColor}, ${inputs.darkColor}, #FFFFFF`;
    const renderInstructions = {
      illustration: "",
      photo: `\n\nRENDERING: Photorealistic subjects processed through the ${s.name} aesthetic as a color/composition filter. Real-looking people and objects. Keep it clean and editorial.`,
      hybrid: `\n\nRENDERING: Real photographic subject against a stylized ${s.name} background. Sharp photo subject, illustrated/graphic environment. Clear separation between the two.`,
      editorial: `\n\nRENDERING: Clean editorial photography. Professional lighting, minimal post-processing. The ${s.name} style influences color grading and composition only. Magazine quality.`,
      "photo-graphic": `\n\nRENDERING: Photorealistic subject on a flat, graphic ${s.name}-styled background. Bold contrast between real photo and flat design.`,
    };
    const ri = renderInstructions[renderMode] || "";
    const prompt = `Create a newsletter thumbnail image for: "${topic.trim()}"

STYLE: ${s.name} — ${complexity === "rich" ? (s.richPrompt || s.prompt) : s.prompt}

SUBJECT: ${complexity === "rich" ? (s.richSubject || s.subject) : s.subject}${ri}

PALETTE: ${colorStr} — adapt to the style's aesthetic.

RULES:
- Landscape 16:9, works at thumbnail size
${complexity === "rich" ? `- INTENTIONAL composition: fill the frame with purposeful design, not clutter
- Every element should earn its place — nothing random or decorative for decoration's sake
- Rich detail is good; visual noise is not. Think well-designed poster, not AI-generated chaos` : `- SIMPLE composition: one focal element, generous negative space
- Do NOT fill the frame — leave breathing room
- Do NOT add decorative elements, textures, or details that weren't specified`}
- ZERO text, words, letters, numbers, or typography in the image${tool.suffix(renderMode)}`;
    setGeneratedPrompt(prompt);

    setCopied(false);
  }, [thumbStyle, renderMode, complexity, topic, aiTool, inputs.accentColor, inputs.darkColor]);

  // Handlers
  const handleChange = (field) => (e) => setInputs(prev => ({ ...prev, [field]: e.target.value }));

  const handleLogo = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { const img = new Image(); img.onload = () => { setInputs(prev => ({ ...prev, logo: img })); setLogoPreview(ev.target.result); }; img.src = ev.target.result; };
    reader.readAsDataURL(file);
  };

  const handleBgImage = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { const img = new Image(); img.onload = () => { setInputs(prev => ({ ...prev, bgImage: img })); setBgPreview(ev.target.result); }; img.src = ev.target.result; };
    reader.readAsDataURL(file);
  };

  const download = (templateId) => {
    const canvas = canvasRefs.current[templateId]; if (!canvas) return;
    const link = document.createElement("a");
    link.download = `substack-${templateId}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  };

  const downloadAll = () => TEMPLATES.forEach((t, i) => setTimeout(() => download(t.id), i * 300));

  const copyPrompt = () => {
    try {
      const ta = document.createElement("textarea"); ta.value = generatedPrompt; ta.style.position = "fixed"; ta.style.left = "-9999px";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    } catch (e) {}
  };

  const resetAll = () => { setInputs({ ...DEFAULT_INPUTS }); setLogoPreview(null); setBgPreview(null); setElemOffsets(JSON.parse(JSON.stringify(DEFAULT_OFFSETS))); };
  const resetPositions = () => setElemOffsets(JSON.parse(JSON.stringify(DEFAULT_OFFSETS)));

  const canvasToReal = (e) => {
    const canvas = canvasRefs.current.postHeader; if (!canvas) return null;
    const rect = canvas.getBoundingClientRect();
    const scale = 1200 / rect.width;
    return { x: (e.clientX - rect.left) * scale, y: (e.clientY - rect.top) * scale };
  };

  const hitTest = (pt) => {
    const hb = hitBoxesRef.current;
    for (const key of ["prehead", "headline", "logo", "url"]) {
      const b = hb[key]; if (!b) continue;
      if (pt.x >= b.x && pt.x <= b.x + b.w && pt.y >= b.y && pt.y <= b.y + b.h) return key;
    }
    return null;
  };

  const onCanvasMouseDown = (e) => {
    const pt = canvasToReal(e); if (!pt) return;
    const elem = hitTest(pt);
    if (elem) {
      dragRef.current = { elem, startX: pt.x, startY: pt.y, origDx: elemOffsets[elem].dx, origDy: elemOffsets[elem].dy };
      e.preventDefault();
    }
  };

  const onCanvasMouseMove = (e) => {
    const canvas = canvasRefs.current.postHeader; if (!canvas) return;
    const pt = canvasToReal(e); if (!pt) return;
    if (dragRef.current) {
      const { elem, startX, startY, origDx, origDy } = dragRef.current;
      canvas.style.cursor = "grabbing";
      setElemOffsets(prev => ({ ...prev, [elem]: { dx: origDx + (pt.x - startX), dy: origDy + (pt.y - startY) } }));
    } else {
      canvas.style.cursor = hitTest(pt) ? "grab" : "default";
    }
  };

  const onCanvasMouseUp = () => {
    dragRef.current = null;
    const canvas = canvasRefs.current.postHeader;
    if (canvas) canvas.style.cursor = "default";
  };

  useEffect(() => {
    const handleUp = () => { dragRef.current = null; };
    window.addEventListener("mouseup", handleUp);
    return () => window.removeEventListener("mouseup", handleUp);
  }, []);

  if (!fontLoaded) return <div style={{ minHeight: "100vh", background: "#111" }} />;

  return (
    <div style={{ minHeight: "100vh", background: "#111", color: "#fff", fontFamily: "'Inter', 'Segoe UI', system-ui, sans-serif" }}>
      {/* ═══ HEADER ═══ */}
      <div style={{ borderBottom: "1px solid #2a2a2a", padding: "20px 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
          <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700, letterSpacing: "-0.5px", whiteSpace: "nowrap" }}>Substack Design Kit</h1>
          <div style={{ display: "flex", gap: 4, background: "#1a1a1a", borderRadius: 8, padding: 3 }}>
            {[["templates", "Templates"], ["thumbnail", "Thumbnail AI"]].map(([id, label]) => (
              <button key={id} onClick={() => setTab(id)} style={{
                padding: "7px 16px", fontSize: 13, fontWeight: 600, borderRadius: 6, border: "none", cursor: "pointer", transition: "all 0.15s",
                background: tab === id ? "#FF6719" : "transparent", color: tab === id ? "#fff" : "#888",
              }}>{label}</button>
            ))}
          </div>
        </div>
        {tab === "templates" && (
          <button onClick={downloadAll} style={{ background: "#FF6719", color: "#fff", border: "none", borderRadius: 6, padding: "9px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            Download All
          </button>
        )}
        {tab === "thumbnail" && generatedPrompt && (
          <button onClick={copyPrompt} style={{ background: copied ? "#2a2a2a" : "#FF6719", color: "#fff", border: "none", borderRadius: 6, padding: "9px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s" }}>
            {copied ? "\u2713 Copied!" : "Copy Prompt"}
          </button>
        )}
      </div>

      {/* ═══ TEMPLATES TAB ═══ */}
      {tab === "templates" && (
        <div style={{ display: "flex", minHeight: "calc(100vh - 68px)" }}>
          {/* Sidebar */}
          <div style={{ width: 300, flexShrink: 0, borderRight: "1px solid #2a2a2a", padding: "24px 20px", display: "flex", flexDirection: "column", gap: 20, overflowY: "auto" }}>
            {/* Style Picker */}
            <div>
              <label style={labelStyle}>Style</label>
              <div style={{ display: "flex", gap: 6 }}>
                {KIT_STYLES.map(s => (
                  <button key={s.id} onClick={() => setKitStyle(s.id)} style={{
                    flex: 1, padding: "8px 4px", fontSize: 12, fontWeight: 600, borderRadius: 6, cursor: "pointer",
                    border: kitStyle === s.id ? "2px solid #FF6719" : "2px solid #333",
                    background: kitStyle === s.id ? "rgba(255,103,25,0.1)" : "#1a1a1a",
                    color: kitStyle === s.id ? "#FF6719" : "#888",
                  }}>{s.label}</button>
                ))}
              </div>
            </div>

            {/* Colors */}
            <div>
              <label style={labelStyle}>Colors</label>
              <div style={{ display: "flex", gap: 10 }}>
                {[["darkColor", "Dark"], ["accentColor", "Accent"]].map(([field, label]) => (
                  <div key={field} style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: "#666", marginBottom: 4 }}>{label}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <input type="color" value={inputs[field]} onChange={handleChange(field)} style={{ width: 36, height: 36, border: "none", borderRadius: 4, cursor: "pointer", background: "none" }} />
                      <input type="text" value={inputs[field]} onChange={handleChange(field)} style={hexInputStyle} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Quick Pick */}
            <div>
              <label style={labelStyle}>Quick Pick</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {PALETTES.map(p => {
                  const isActive = inputs.darkColor.toLowerCase() === p.dark.toLowerCase() && inputs.accentColor.toLowerCase() === p.accent.toLowerCase();
                  return (
                    <button key={p.label} title={p.label} onClick={() => setInputs(prev => ({ ...prev, darkColor: p.dark, accentColor: p.accent }))}
                      style={{ width: 48, height: 28, borderRadius: 6, border: isActive ? "2px solid #fff" : "2px solid #333", cursor: "pointer", padding: 0, overflow: "hidden", display: "flex" }}>
                      <div style={{ width: "50%", height: "100%", background: p.dark }} />
                      <div style={{ width: "50%", height: "100%", background: p.accent }} />
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Logo */}
            <div>
              <label style={labelStyle}>Logo</label>
              {logoPreview ? (
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <img src={logoPreview} alt="logo" style={{ width: 48, height: 48, objectFit: "contain", borderRadius: 4, background: "#222" }} />
                  <button onClick={() => { setInputs(prev => ({ ...prev, logo: null })); setLogoPreview(null); }} style={{ fontSize: 12, color: "#ff4444", background: "none", border: "1px solid #ff4444", borderRadius: 4, padding: "4px 10px", cursor: "pointer" }}>Remove</button>
                </div>
              ) : (
                <label style={{ display: "block", padding: "14px", border: "2px dashed #333", borderRadius: 8, textAlign: "center", cursor: "pointer", fontSize: 13, color: "#666" }}>
                  Upload PNG or SVG
                  <input type="file" accept="image/*" onChange={handleLogo} style={{ display: "none" }} />
                </label>
              )}
              <div style={{ fontSize: 11, color: "#555", marginTop: 4 }}>No logo? Initials are auto-generated.</div>
              <div style={{ marginTop: 8 }}>
                <div style={{ fontSize: 11, color: "#666", marginBottom: 4 }}>Opacity: {inputs.logoOpacity}%</div>
                <input type="range" min="0" max="100" value={inputs.logoOpacity} onChange={(e) => setInputs(prev => ({ ...prev, logoOpacity: Number(e.target.value) }))} style={{ width: "100%", accentColor: "#FF6719" }} />
              </div>
            </div>

            {/* Background Image */}
            <div>
              <label style={labelStyle}>Post Header Background</label>
              {bgPreview ? (
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                    <img src={bgPreview} alt="bg" style={{ width: 80, height: 42, objectFit: "cover", borderRadius: 4, border: "1px solid #333" }} />
                    <button onClick={() => { setInputs(prev => ({ ...prev, bgImage: null })); setBgPreview(null); }} style={{ fontSize: 12, color: "#ff4444", background: "none", border: "1px solid #ff4444", borderRadius: 4, padding: "4px 10px", cursor: "pointer" }}>Remove</button>
                  </div>
                  <div style={{ fontSize: 11, color: "#666", marginBottom: 4 }}>Overlay darkness: {inputs.overlayOpacity}%</div>
                  <input type="range" min="0" max="85" value={inputs.overlayOpacity} onChange={(e) => setInputs(prev => ({ ...prev, overlayOpacity: Number(e.target.value) }))} style={{ width: "100%", accentColor: "#FF6719" }} />
                </div>
              ) : (
                <label style={{ display: "block", padding: "14px", border: "2px dashed #333", borderRadius: 8, textAlign: "center", cursor: "pointer", fontSize: 13, color: "#666" }}>
                  Upload image (optional)
                  <input type="file" accept="image/*" onChange={handleBgImage} style={{ display: "none" }} />
                </label>
              )}
              <div style={{ fontSize: 11, color: "#555", marginTop: 4 }}>Upload an AI-generated image or photo. Text overlays on top.</div>
            </div>

            {/* Toggles */}
            <div>
              <label style={labelStyle}>Template Elements</label>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[["showPrehead", "Prehead"], ["showHeadline", "Headline"], ["showLogo", "Logo"], ["showUrl", "URL"]].map(([key, label]) => (
                  <Toggle key={key} on={inputs[key]} onToggle={() => setInputs(prev => ({ ...prev, [key]: !prev[key] }))} label={label} />
                ))}
              </div>
            </div>

            <hr style={{ border: "none", borderTop: "1px solid #222", margin: "4px 0" }} />

            <Field label="Newsletter Name" value={inputs.name} onChange={handleChange("name")} placeholder="Your Newsletter" />
            <Field label="Prehead" value={inputs.prehead} onChange={handleChange("prehead")} placeholder="Insert Your Prehead" />
            <Field label="Category" value={inputs.category} onChange={handleChange("category")} placeholder="Your Category" />
            <Field label="Headline" value={inputs.headline} onChange={handleChange("headline")} placeholder="Insert Your Headline" />
            <Field label="Tagline" value={inputs.tagline} onChange={handleChange("tagline")} placeholder="A short tagline about what you write" />
            <Field label="URL" value={inputs.url} onChange={handleChange("url")} placeholder="yourstack.substack.com" />

            <hr style={{ border: "none", borderTop: "1px solid #222", margin: "4px 0" }} />
            <button onClick={resetAll} style={{ width: "100%", padding: "10px", fontSize: 13, fontWeight: 600, background: "none", border: "1px solid #444", borderRadius: 6, color: "#888", cursor: "pointer" }}>
              Reset All
            </button>
          </div>

          {/* Preview Area */}
          <div style={{ flex: 1, padding: "24px 32px", overflowY: "auto", display: "flex", flexDirection: "column", gap: 32 }}>
            {TEMPLATES.map(t => (
              <div key={t.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div>
                    <span style={{ fontWeight: 600, fontSize: 15 }}>{t.label}</span>
                    <span style={{ color: "#666", fontSize: 13, marginLeft: 10 }}>{t.desc}</span>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    {t.id === "postHeader" && (
                      <button onClick={resetPositions} style={{ background: "none", color: "#888", border: "1px solid #444", borderRadius: 5, padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                        Reset Positions
                      </button>
                    )}
                    <button onClick={() => download(t.id)} style={{ background: "#222", color: "#ccc", border: "1px solid #333", borderRadius: 5, padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                      Download PNG
                    </button>
                  </div>
                </div>
                <div style={{ background: t.id === "wordmark" ? "repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 50% / 16px 16px" : "#0a0a0a", borderRadius: 8, padding: 12, border: "1px solid #222" }}>
                  <canvas ref={el => canvasRefs.current[t.id] = el} width={t.width} height={t.height}
                    onMouseDown={t.id === "postHeader" ? onCanvasMouseDown : undefined}
                    onMouseMove={t.id === "postHeader" ? onCanvasMouseMove : undefined}
                    onMouseUp={t.id === "postHeader" ? onCanvasMouseUp : undefined}
                    style={{ width: "100%", height: "auto", display: "block", borderRadius: 4 }} />
                </div>
                {t.id === "postHeader" && <div style={{ fontSize: 11, color: "#555", marginTop: 6 }}>Drag elements to reposition them on the canvas.</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ═══ THUMBNAIL AI TAB ═══ */}
      {tab === "thumbnail" && (
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 32px" }}>
          <p style={{ fontSize: 14, color: "#888", marginBottom: 28, lineHeight: 1.5 }}>
            Pick a visual style, enter your topic, and get an AI image prompt. The generated image can be uploaded as a post header background in the Templates tab.
          </p>

          {/* Step 1: Style \u2014 Horizontal Carousel */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 12 }}>1 \u2014 Visual Style</div>
            <div style={{ overflowX: "auto", paddingBottom: 8, WebkitOverflowScrolling: "touch" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#555", textTransform: "uppercase", letterSpacing: "1.2px", marginBottom: 8 }}>Design Styles</div>
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                {THUMB_STYLES.map(s => (
                  <div key={s.id} style={{ minWidth: 180, maxWidth: 180, flexShrink: 0 }}>
                    <StyleCard style={s} selected={thumbStyle === s.id} onClick={() => setThumbStyle(s.id)} />
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#555", textTransform: "uppercase", letterSpacing: "1.2px", marginBottom: 8 }}>Brand Inspired</div>
              <div style={{ display: "flex", gap: 10 }}>
                {BRAND_STYLES.map(s => (
                  <div key={s.id} style={{ minWidth: 180, maxWidth: 180, flexShrink: 0 }}>
                    <StyleCard style={s} selected={thumbStyle === s.id} onClick={() => setThumbStyle(s.id)} />
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Step 2: Rendering + Colors */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 28 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 12 }}>2 \u2014 Rendering</div>
              <div style={{ display: "flex", gap: 8, marginBottom: renderMode !== "illustration" ? 10 : 0 }}>
                {[["illustration", "Illustrated"], ["photo", "Photography"]].map(([id, label]) => {
                  const isActive = id === "illustration" ? renderMode === "illustration" : renderMode !== "illustration";
                  return (
                    <button key={id} onClick={() => setRenderMode(id === "illustration" ? "illustration" : "photo")} style={{
                      flex: 1, padding: "10px 16px", borderRadius: 8, border: isActive ? "2px solid #FF6719" : "2px solid #2a2a2a",
                      background: isActive ? "rgba(255,103,25,0.1)" : "#1a1a1a", color: isActive ? "#FF6719" : "#ccc",
                      fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
                    }}>{label}</button>
                  );
                })}
              </div>
              {renderMode !== "illustration" && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {[["photo", "Style as Filter"], ["hybrid", "Hybrid"], ["editorial", "Clean Editorial"], ["photo-graphic", "Photo + Graphic BG"]].map(([id, label]) => (
                    <button key={id} onClick={() => setRenderMode(id)} style={{
                      padding: "6px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
                      border: renderMode === id ? "1.5px solid #FF6719" : "1.5px solid #333",
                      background: renderMode === id ? "rgba(255,103,25,0.15)" : "#151515",
                      color: renderMode === id ? "#FF6719" : "#999",
                    }}>{label}</button>
                  ))}
                </div>
              )}
              <div style={{ marginTop: 12 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#555", textTransform: "uppercase", letterSpacing: "1px", marginBottom: 6 }}>Complexity</div>
                <div style={{ display: "flex", gap: 6 }}>
                  {[["clean", "Clean", "Minimal, one focal element"], ["rich", "Rich", "Full composition, intentional detail"]].map(([id, label, desc]) => (
                    <button key={id} onClick={() => setComplexity(id)} style={{
                      flex: 1, padding: "8px 12px", borderRadius: 8, cursor: "pointer", transition: "all 0.15s", textAlign: "left",
                      border: complexity === id ? "1.5px solid #FF6719" : "1.5px solid #2a2a2a",
                      background: complexity === id ? "rgba(255,103,25,0.1)" : "#151515",
                    }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: complexity === id ? "#FF6719" : "#ccc", marginBottom: 2 }}>{label}</div>
                      <div style={{ fontSize: 10, color: "#666", lineHeight: 1.3 }}>{desc}</div>
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 12 }}>Colors</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <div style={{ display: "flex", gap: 3, padding: 4, background: "#1a1a1a", borderRadius: 8, border: "1px solid #2a2a2a" }}>
                  <div style={{ width: 28, height: 28, borderRadius: "6px 2px 2px 6px", background: inputs.accentColor }} />
                  <div style={{ width: 28, height: 28, borderRadius: "2px", background: inputs.darkColor }} />
                  <div style={{ width: 28, height: 28, borderRadius: "2px 6px 6px 2px", background: "#FFFFFF" }} />
                </div>
                <span style={{ fontSize: 12, color: "#666" }}>Using your brand colors from Templates</span>
              </div>
            </div>
          </div>

          {/* Step 3: Topic + AI Tool */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 20, marginBottom: 28, alignItems: "start" }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 12 }}>3 — Article Topic</div>
              <textarea value={topic} onChange={e => setTopic(e.target.value)} placeholder="e.g. How I grew my newsletter from 0 to 10K subscribers using SEO..." rows={3}
                style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", borderRadius: 10, padding: "12px 14px", fontSize: 14, color: "#fff", resize: "vertical", lineHeight: 1.5, fontFamily: "inherit" }} />
            </div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 12 }}>AI Tool</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {AI_TOOLS.map(t => (
                  <button key={t.id} onClick={() => setAiTool(t.id)} style={{
                    padding: "8px 16px", borderRadius: 8, border: aiTool === t.id ? "2px solid #FF6719" : "2px solid #2a2a2a",
                    background: aiTool === t.id ? "rgba(255,103,25,0.1)" : "#1a1a1a", color: aiTool === t.id ? "#FF6719" : "#ccc",
                    fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s", fontFamily: "inherit",
                  }}>{t.name}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Output */}
          {generatedPrompt ? (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "1.5px" }}>Your Prompt</div>
                <button onClick={copyPrompt} style={{
                  background: copied ? "#2a2a2a" : "#FF6719", color: "#fff", border: "none", borderRadius: 6,
                  padding: "8px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
                }}>{copied ? "\u2713 Copied!" : "Copy Prompt"}</button>
              </div>
              <div className="prompt-box">{generatedPrompt}</div>
              <div style={{ marginTop: 16, padding: "14px 16px", background: "rgba(255,103,25,0.08)", borderRadius: 10, borderLeft: "3px solid #FF6719" }}>
                <div style={{ fontSize: 12, color: "#999", lineHeight: 1.6 }}>
                  <strong style={{ color: "#ccc" }}>Next step:</strong> Paste this prompt into your AI image tool, download the result, then switch to the <strong style={{ color: "#FF6719", cursor: "pointer" }} onClick={() => setTab("templates")}>Templates tab</strong> and upload it as a Post Header Background.
                </div>
              </div>
            </div>
          ) : (
            <div style={{ border: "2px dashed #2a2a2a", borderRadius: 12, padding: "40px 24px", textAlign: "center", color: "#666" }}>
              <div style={{ fontSize: 28, marginBottom: 10 }}>&#127912;</div>
              <p style={{ fontSize: 13, lineHeight: 1.5 }}>
                {!thumbStyle ? "Start by picking a visual style above" : "Enter your article topic to generate a prompt"}
              </p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
